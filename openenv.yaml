name: Smart Message Prioritization Environment
version: 1.0.0
description: AI agent learns to triage messages (high/medium/low priority) in a simulated inbox.
action_space:
  type: object
  properties:
    action_type:
      type: string
      enum: [set_priority, pin_message, next]
    priority:
      type: string
      enum: [high, medium, low]
    message_id:
      type: string
observation_space:
  type: object
reward_range: [-1.0, 2.0]